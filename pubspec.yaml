name: uff
description: "Unified Fitness Foundation app."
publish_to: "none"
version: 1.0.0+24

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  go_router: ^16.0.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  flutter_dotenv: ^6.0.0
  supabase_flutter: ^2.10.2
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6
  mapbox_maps_flutter: ^2.12.0
  permission_handler: ^12.0.1
  tracelet: ^1.2.0
  drift: ^2.27.0
  drift_flutter: ^0.2.4
  path: ^1.9.0
  path_provider: ^2.1.5
  sqlite3_flutter_libs: ^0.5.28
  connectivity_plus: ^7.0.0
  meta: ^1.17.0
  fit_tool: ^1.0.5
  xml: ^6.5.0
  file_picker: ^9.2.2
  fl_chart: ^1.2.0
  geolocator: ^12.0.0
  archive: ^4.0.9
  # 2026-03-18 merge: keep camera photo deps and onboarding page-indicator dep.
  image_picker: ^1.2.0
  image_cropper: ^12.1.1
  flutter_image_compress: ^2.4.0
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0
  smooth_page_indicator: ^1.2.1
  shared_preferences: ^2.5.3
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  flutter_markdown_plus: ^1.0.7
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  test: ^1.28.0
  riverpod: ^3.0.3
  riverpod_generator: ^3.0.3
  build_runner: ^2.5.4
  freezed: ^3.2.3
  json_serializable: ^6.11.1
  drift_dev: ^2.27.0
  very_good_analysis: ^9.0.0
  custom_lint: ^0.8.1
  fake_async: ^1.3.3
  mocktail: ^1.0.4
  patrol: ^4.3.0
  patrol_finders: ^3.1.0
  geolocator_platform_interface: ^4.2.6
  plugin_platform_interface: ^2.1.8

patrol:
  app_name: UFF
  test_directory: e2e_test
  android:
    package_name: com.gridl.uff
  ios:
    bundle_id: com.gridl.uff

flutter:
  uses-material-design: true
  assets:
    - assets/brand/
    - .env.dev
    - .env.staging
    - .env.prod
    - docs/privacy_policy.md
    - docs/terms_of_service.md
    - e2e_test/test_data/5k_run.json
    - e2e_test/test_data/generated/
    - e2e_test/test_data/photo_a.jpg
    - e2e_test/test_data/photo_b.png
