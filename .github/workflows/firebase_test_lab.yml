name: Firebase Test Lab

on:
  workflow_dispatch:
    inputs:
      device_token:
        description: Optional override for the test device token
        required: false
        type: string
  schedule:
    - cron: "30 8 * * *"

# Public-mirror lane runs the receipt contract in --dry-run on both platforms:
# the mirror does not ship private brand assets or .env.dev needed to build
# real APKs, and it has no macOS runners. Dry-run still exercises the dispatch
# contract end-to-end and produces the four runner-owned JSON evidence files
# (submission_request.json, dispatch_result.json, matrix_summary.json,
# stage_summary.json). Real Test Lab submissions are dispatched from a
# checkout that has the build inputs, not from the public mirror.

jobs:
  android_test_lab:
    name: Android Firebase Test Lab
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FCM_PROJECT_ID: ${{ secrets.FCM_PROJECT_ID }}
      FIREBASE_TEST_DEVICE_TOKEN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.device_token || secrets.FIREBASE_TEST_DEVICE_TOKEN }}
      FIREBASE_OUTPUT_DIR: tmp/firebase_test_lab/android
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Android Firebase Test Lab receipt lane
        run: |
          bash scripts/dev/run_firebase_test_lab_push_receipt.sh \
            --platform android \
            --device-token "${FIREBASE_TEST_DEVICE_TOKEN}" \
            --correlation-id "gha-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-android" \
            --dry-run \
            --output-dir "${FIREBASE_OUTPUT_DIR}"

      - name: Upload Android Test Lab artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-test-lab-android-${{ github.run_id }}-${{ github.run_attempt }}
          path: tmp/firebase_test_lab/android/**
          if-no-files-found: error

  ios_test_lab:
    name: iOS Firebase Test Lab
    runs-on: ubuntu-latest
    needs: android_test_lab
    permissions:
      contents: read
    env:
      FIREBASE_TEST_DEVICE_TOKEN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.device_token || secrets.FIREBASE_TEST_DEVICE_TOKEN }}
      FIREBASE_OUTPUT_DIR: tmp/firebase_test_lab/ios
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run iOS Firebase Test Lab receipt lane
        run: |
          bash scripts/dev/run_firebase_test_lab_push_receipt.sh \
            --platform ios \
            --device-token "${FIREBASE_TEST_DEVICE_TOKEN}" \
            --correlation-id "gha-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-ios" \
            --dry-run \
            --output-dir "${FIREBASE_OUTPUT_DIR}"

      - name: Upload iOS Test Lab artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-test-lab-ios-${{ github.run_id }}-${{ github.run_attempt }}
          path: tmp/firebase_test_lab/ios/**
          if-no-files-found: error
