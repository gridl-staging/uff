name: Baseline CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze_format:
    name: Analyze and format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Flutter (stable channel with cache)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze project
        run: flutter analyze
      - name: Verify formatting
        run: dart format --set-exit-if-changed lib/

  unit_widget_tests:
    name: Unit and widget tests with coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Flutter (stable channel with cache)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Run unit and widget tests with coverage
        run: flutter test test/ --coverage

  e2e_standards:
    name: E2E standards enforcement
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Flutter (stable channel with cache)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Run e2e standards check
        run: ./scripts/check_e2e_standards.sh
