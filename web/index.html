<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UFF — Run Free</title>
  <meta name="description" content="UFF is a fitness and running app built for athletes who want to own their data. Coming soon to iOS and Android.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }

    .logo {
      font-size: 4rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, #ff6b35, #f7c948);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
    }

    .tagline {
      font-size: 1.25rem;
      color: #999;
      font-weight: 300;
      margin-bottom: 3rem;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      padding: 0.6rem 1.5rem;
      border: 1px solid #333;
      border-radius: 999px;
      font-size: 0.85rem;
      color: #ccc;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .subtle {
      margin-top: 4rem;
      font-size: 0.75rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">UFF</div>
    <p class="tagline">
      A fitness &amp; running app for athletes who want to own their data.<br>
      Coming soon to iOS and Android.
    </p>
    <span class="badge">Coming Soon</span>
    <p class="subtle">&copy; 2026 UFF</p>
  </div>
</body>
</html>
